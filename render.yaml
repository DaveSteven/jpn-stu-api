services:
  - type: web
    runtime: docker
    name: japanese-study-api
    plan: free
    healthCheckPath: /api/health
    preDeployCommand: python scripts/import_questions.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: japanese-study-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: DEFAULT_DAVID_PASSWORD
        sync: false

databases:
  - name: japanese-study-db
    plan: free
    databaseName: japanese_study
    user: japanese_study
