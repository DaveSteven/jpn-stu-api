services:
  db:
    image: postgres:16
    container_name: japanese_study_db
    environment:
      POSTGRES_DB: japanese_study
      POSTGRES_USER: japanese_study
      POSTGRES_PASSWORD: japanese_study
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U japanese_study -d japanese_study"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: japanese_study_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://japanese_study:japanese_study@db:5432/japanese_study
      CORS_ORIGINS: http://127.0.0.1:5173,http://localhost:5173
      DEFAULT_DAVID_PASSWORD: "214423"
      EXAM_ASSETS_DIR: /app/exam_assets
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./import_data:/app/import_data:ro
      - ../mojitest_spider/data/assets:/app/exam_assets:ro
    restart: unless-stopped

volumes:
  postgres_data:
